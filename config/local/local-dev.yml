server:
  port: 8010
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

spring:
  application:
    name: OIDF-Registry
  datasource:
    url: jdbc:mariadb://localhost:3306/testdb
    username: test
    password: test

  threads:
    virtual:
      enabled: true

  flyway:
    enabled: true

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false





  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: file:config/local/dev_swedenconnect_se_auth_pub.key
          audiences: account

logging:
  level:
    org.springframework.context.annotation: info
    se.swedenconnect.oidf: info


credential:
  bundles:
    pem:
      sign-key-store-pem:
        private-key: file:/Users/pepl/src/oidf-entity-registry/oidf_service.key
        certificates: file:/Users/pepl/src/oidf-entity-registry/oidf_service.pem
    keystore:
      signkey:
        location: file:config/local/rsa1.jks
        password: Test1234
        type: JKS

    jks:


      federationapi:
        store-reference: signkey
        name: "FederationAPI-JWKSignkey"
        key:
          alias: rsa1
          key-password: Test1234

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "http://oidf-registry.swedenconnect.se"
        sign_key_alias: sign-key-store-pem
        notification_active: true
        notifications:
          - endpoint: http://www.swedenconnect.se/sc/notify
            instance_id: 123e4567-e89b-12d3-a456-426614174000
          - endpoint: http://www.swedenconnect.se/ena/notify
            instance_id: 223e4567-e89b-12d3-a456-426614174001

      instances:
        - instance_id: "C0290CE5-EC80-4536-9E55-3937E5756DDC"
          name: "Swedenconnect"
          useForDefaultAssignment: true

        - instance_id: "223e4567-e89b-12d3-a456-426614174001"
          name: "ENA"
          org_numbers:
            - "2021002114"
            - "99999999"