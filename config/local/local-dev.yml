spring:
  application:
    name: EntityRegistryService

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mariadb://db:3306/testdb
    username: test
    password: test

  flyway:
    enabled: true

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      enabled: true

logging:
  level:
    se:
      swedenconnect:
        oidf: debug

server:
  compression:
    enabled: true

credential:
  bundles:
    keystore:
      signkey:
        location: file:config/local/rsa1.jks
        password: Test1234
        type: JKS
    jks:
      federationapi:
        store-reference: signkey
        name: "FederationAPI-JWKSignkey"
        key:
          alias: rsa1
          key-password: Test1234

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "http://oidf-registry.swedenconnect.se"
        sign-key-alias: federationapi
