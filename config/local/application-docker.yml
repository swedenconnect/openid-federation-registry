server:
  port: 8010

spring:
  application:
    name: OIDF-Registry
  datasource:
    url: jdbc:mariadb://localhost:3307/registry
    username: registry
    password: 45743523-DE8C-45FE-BD3D-36A5E17922AC
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: file:../config/local/snake-oil.pem
          audiences: account

credential:
  bundles:
    keystore:
      signkey:
        location: file:../config/local/snake-oil.p12
        password: EBA4286F-4C20-4BAF-BE54-95FA31646DF5
        type: JKS
    jks:
      federationapi:
        store-reference: signkey
        name: "FederationAPI-JWKSignkey"
        key:
          alias: snake-oil
          key-password: EBA4286F-4C20-4BAF-BE54-95FA31646DF5

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "http://oidf-registry.example.org"
        sign_key_alias: federationapi
        notification_active: true
        notifications:
          - endpoint: http://www.swedenconnect.se/sc/notify
            instance_id: 123e4567-e89b-12d3-a456-426614174000
          - endpoint: http://www.swedenconnect.se/ena/notify
            instance_id: 223e4567-e89b-12d3-a456-426614174001
      instances:
        - instance_id: "20A0AAF5-6E2A-4612-AAEE-A489B86B7C25"
          name: "Example Organization"
          useForDefaultAssignment: true
        - instance_id: "34A03B18-C2EA-4659-9236-B983CD173C6F"
          name: "Example Organization 2"
          org_numbers:
            - "275571-7937"
            - "952610-6464"

logging:
  level:
    se.swedenconnect.oidf: debug
