openapi: 3.1.0
info:
  contact:
    email: support@swedenconnect.se
    name: Sweden Connect
    url: https://www.swedenconnect.se
  description: "REST API for managing OpenID Federation entities, policies, modules,\
    \ and trust marks. This API provides endpoints for creating, reading, updating,\
    \ and deleting federation entities, policies, trust anchors, resolvers, trust\
    \ marks, and trust mark subjects."
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: OpenID Federation Entity Registry API
  version: 0.5.10-SNAPSHOT
servers:
  - description: Generated server url
    url: http://localhost:8010
security:
  - bearerAuth: [ ]
    selectedOrgNumber: [ ]
tags:
  - description: CRUD for trust mark subjects
    name: TrustmarkSubjects
  - description: CRUD for metadata policies
    name: Policies
  - description: CRUD for federation modules
    name: Modules
  - description: "CRUD for federation, hosted and subordinate entities"
    name: Entities
