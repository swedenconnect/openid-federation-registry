components:
  schemas:
    TrustmarkSubjectInput:
      example:
        trustmarkId: trustmarkId
        expires: expires
        subject: subject
        revoked: true
        granted: granted
      properties:
        trustmarkId:
          description: Trust mark identifier (entity id)
          type: string
        subject:
          description: Subject entity id
          type: string
        revoked:
          description: If the trust mark is revoked for this subject
          type: boolean
        granted:
          description: "Granted time (ISO-8601, e.g. 2025-01-01T00:00:00Z)"
          type: string
        expires:
          description: Expires time (ISO-8601)
          type: string
    TrustmarkSubject:
