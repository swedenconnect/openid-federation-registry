openapi: 3.0.0
info:
  title: Entity Management API
  description: API for managing entities with configuration details
  version: 0.0.1
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api.example.com/oidf
    description: Registry API server

security:
  - bearerAuth: [ ]

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    options-record:
      type: object
      properties:
        metadata:
          type: object
          properties:
            changeby:
              type: string
              description: "Changed by user"
            createdby:
              type: string
              description: "Created by user"
            changedate:
              type: string
              format: date-time
              description: "Change date"
            createddate:
              type: string
              format: date-time
              description: "Create date"
        option:
          type: array
          items:
            title: Values
            type: object
            properties:
              key:
                type: string
                description: "The unique key used in the configuration"
              value:
                type: string
                description: "The value associated with the key"
              value_type:
                type: string
                description: "The type of the value (e.g., string, integer, boolean)"
              validation:
                type: string
                description: "Validation rule or pattern applied to the value"
              setting_description:
                type: string
                description: "A human-readable description of the configuration setting"
              options:
                type: array
                description: "A list of allowed options for this configuration setting"
                items:
                  title: "OptionRecord"
                  type: object
                  properties:
                    key:
                      type: string
                      description: "The key for this option"
                    value:
                      type: string
                      description: "The value associated with this option"
                    selected:
                      type: boolean
                      description: "Indicates if this option is selected by default"
                  required:
                    - key
                    - value
                    - selected
                required:
                  - key
                  - value
                  - value_type
                  - description
        option-children:
          type: array
          items:
            title: OptionChildren
            type: object
            properties:
              option-group:
                type: string
                description: "Name of the option group"
              id-group:
                type: string
                description: "Id group"

paths:
  /registry/v1:
    post:
      summary: Create a new entity
      tags:
        - entities
      requestBody:
        description: Entity to be created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/options-record'
      responses:
        '201':
          description: Entity created successfully
    get:
      summary: Get all entities
      tags:
        - entities
      responses:
        '200':
          description: A list of entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/options-record'

  /registry/v1/{entityRecordId}:
    get:
      summary: Get a specific entity by ID
      tags:
        - entities
      parameters:
        - name: entityRecordId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the entity to retrieve
      responses:
        '200':
          description: Entity details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/options-record'
        '404':
          description: Entity not found
    put:
      summary: Update a specific entity by ID
      tags:
        - entities
      parameters:
        - name: entityRecordId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the entity to update
      requestBody:
        description: Entity data to update
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/options-record'
      responses:
        '200':
          description: Entity updated successfully
        '404':
          description: Entity not found
    delete:
      summary: Delete a specific entity by ID
      tags:
        - entities
      parameters:
        - name: entityRecordId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the entity to delete
      responses:
        '204':
          description: Entity deleted successfully
        '404':
          description: Entity not found