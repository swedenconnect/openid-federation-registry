server:
  port: 8010
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

spring:
  application:
    name: EntityRegistryService

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mariadb://localhost:4306/registry
    username: oidf
    password: oidf

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://as.local.swedenconnect.se/realms/oidfrealm
          audiences: https://registry.local.swedenconnect.se

logging:
  level:
    se:
      swedenconnect:
        oidf: debug

credential:
  bundles:
    keystore:
      signkey:
        location: file:../config/local/rsa1.jks
        password: Test1234
        type: JKS
    jks:
      federationapi:
        store-reference: signkey
        name: "FederationAPI-JWKSignkey"
        key:
          alias: rsa1
          key-password: Test1234

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "http://oidf-registry.swedenconnect.se"
        sign-key-alias: federationapi
