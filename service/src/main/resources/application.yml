management:
  prometheus:
    metrics:
      export:
        enabled: true
  server:
    port: 8011
  endpoints:
    web:
      exposure:
        include: "*"
spring:
  application:
    name: EntityRegistryService

  threads:
    virtual:
      enabled: true

  jackson:
    default-property-inclusion: non_null

  flyway:
    enabled: true

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    se:
      swedenconnect:
        oidf: info

server:
  port: 8010
  compression:
    enabled: true

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "https://oidf-registry.swedenconnect.se"
        token-expiry-duration: PT168H
