management:
  metrics:
    tags:
      application_version: ${spring.application.version}
      application_name: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  server:
    port: 8011
  endpoints:
    web:
      exposure:
        include: "*"
spring:
  application:
    name: oidf-registry
    version: '@project.version@'

  threads:
    virtual:
      enabled: true

  jackson:
    default-property-inclusion: non_null

  flyway:
    enabled: true

  docker:
    compose:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    se:
      swedenconnect:
        oidf: info

server:
  port: 8010
  compression:
    enabled: true

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "https://oidf-registry.swedenconnect.se"
        token-expiry-duration: PT168H
        notification-active: false
        notification-retry-count: 3
        notification-retry-delay-duration: PT10S
