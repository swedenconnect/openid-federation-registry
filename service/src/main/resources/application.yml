management:
  metrics:
    tags:
      application_version: ${spring.application.version}
      application_name: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

  endpoints:
    web:
      exposure:
        include: "*"
spring:
  application:
    name: oidf-registry
    version: '@project.version@'

  threads:
    virtual:
      enabled: true

  jackson:
    default-property-inclusion: non_null

  flyway:
    enabled: true

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    se:
      swedenconnect:
        oidf: info

server:
  port: 8010
  compression:
    enabled: true
  forward-headers-strategy: framework

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "https://oidf-registry.swedenconnect.se"
        token-expiry-duration: PT168H
        notification-active: false

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    persistAuthorization: true
