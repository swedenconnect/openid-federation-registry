spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: create

    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  sql:
    init:
      mode: always

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "http://oidf-registry.swedenconnect.se"
        sign-key-alias: federationapi
      instances:
        - instance_id: "123e4567-e89b-12d3-a456-426614174000"
          name: "Swedenconnect"
          useForDefaultAssignment: true
        - instance_id: "223e4567-e89b-12d3-a456-426614174001"
          name: "ENA"
          org_numbers:
            - "2021002114"
            - "99999999"

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
