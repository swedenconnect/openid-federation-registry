logging:
  level:
    se:
      swedenconnect:
        oidf: debug
    org:
      springframework:
        web: DEBUG
        https: DEBUG
      hibernate.SQL: DEBUG
      hibernate.orm.jdbc.bind: TRACE


openid:
  federation:
    registry:
      federation_service_api:
        issuer: "http://oidf-registry.swedenconnect.se"
        sign-key-alias: federationapi
        token-expiry-duration: PT168H
      instances:
        - instance_id: "123e4567-e89b-12d3-a456-426614174000"
          name: "Swedenconnect"
          useForDefaultAssignment: true
        - instance_id: "223e4567-e89b-12d3-a456-426614174001"
          name: "ENA"
          org_numbers:
            - "2021002114"
            - "99999999"

credential:
  bundles:
    keystore:
      signkey:
        location: classpath:rsa1.jks
        password: Test1234
        type: JKS
    jks:
      federationapi:
        store-reference: signkey
        name: "FederationAPI-JWKSignkey"
        key:
          alias: rsa1
          key-password: Test1234


spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:public_auth_cert.pem
          audiences: account
  jpa:
    show-sql: false

    properties:
      hibernate:
        format_sql: false


management:
  endpoints:
    web:
      exposure:
        include: '*'