logging:
  level:
    se:
      swedenconnect:
        oidf: debug
    org:
      springframework:
        web: DEBUG
        https: DEBUG
      hibernate.SQL: DEBUG
      hibernate.orm.jdbc.bind: TRACE


openid:
  federation:
    registry:
      federation_service_api:
        issuer: "http://oidf-registry.swedenconnect.se"
        sign-key-alias: federationapi
        token-expiry-duration: PT168H
      instances:
        - instance_id: "123e4567-e89b-12d3-a456-426614174000"
          name: "Swedenconnect"
          useForDefaultAssignment: true
        - instance_id: "223e4567-e89b-12d3-a456-426614174001"
          name: "ENA"
          org_numbers:
            - "2021002114"
            - "99999999"
        - instance_id: "333333-e89b-12d3-a456-4444444444"
          name: "Swedenconnect Sandbox"
          defaultBaseUrl: https://dev.swedenconnect.se/sc/${usercontext.orgnumber}
          matcher:
            default: "true"
            org-numbers:
              - "2021002114"
              - "99999999"
            functiongroups:
              - "swedenconnect"

credential:
  bundles:
    keystore:
      signkey:
        location: classpath:rsa1.jks
        password: Test1234
        type: JKS
    jks:
      federationapi:
        store-reference: signkey
        name: "FederationAPI-JWKSignkey"
        key:
          alias: rsa1
          key-password: Test1234


spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:public_auth_cert.pem
          audiences: account

      client:
        registration:
          entity-registry:
            client-id: oidf-entity-registry
            client-secret: BWiMNP3JefVDlUH0Re9MB2ULFPmfRtSR
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - openid
            provider: keycloak
        provider:
          keycloak:
            authorization-uri: "http://localhost:1987/realms/oidfrealm/protocol/openid-connect/auth"
            token-uri: "http://localhost:1987/realms/oidfrealm/protocol/openid-connect/token"
            jwk-set-uri: "http://localhost:1987/realms/oidfrealm/protocol/openid-connect/certs"

  jpa:
    show-sql: false

    properties:
      hibernate:
        format_sql: false


management:
  endpoints:
    web:
      exposure:
        include: '*'