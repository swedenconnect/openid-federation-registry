
logging:
  level:
    se:
      swedenconnect:
        oidf: debug

openid:
  federation:
    registry:
      federation_service_api:
        issuer: "http://oidf-registry.swedenconnect.se/test"
        sign-key-alias: federationapi

credential:
  bundles:
    keystore:
      signkey:
        location: classpath:rsa1.jks
        password: Test1234
        type: JKS
    jks:
      federationapi:
        store-reference: signkey
        name: "FederationAPI-JWKSignkey"
        key:
          alias: rsa1
          key-password: Test1234


management:
  endpoints:
    web:
      exposure:
        include: '*'